name: Frontend CI/CD Pipeline

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main
      - "feature/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-pipeline:
    name: Frontend Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 01 - Commit Message
        run: echo "Schritt Commit Message ist erreicht"

      - name: 02 - Branch Protection
        run: echo "Schritt Branch Protection ist erreicht"

      - name: 03 - Set up Node.js (no cache)
        if: ${{ hashFiles('**/package-lock.json') == '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 03 - Set up Node.js (npm cache)
        if: ${{ hashFiles('**/package-lock.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          #cache: 'npm'

      - name: 03b - Install dependencies
        run: |
          if [ -f package.json ] && [ -f package-lock.json ]; then
            echo "package.json + package-lock.json gefunden, installiere Abhaengigkeiten"
            npm ci
          else
            echo "Kein package.json oder package-lock.json, ueberspringe npm ci"
          fi

      - name: 04 - Format
        run: |
          echo "Schritt Format ist erreicht"

          echo "::group::Run Prettier format check"
          if [ -f package.json ] && [ "$(npm pkg get scripts.format)" != "null" ]; then
            npm run format
          else
            echo "Kein Format-Script oder package.json vorhanden"
          fi
          echo "::endgroup::"

      - name: 05 - Linting
        run: |
          echo "Schritt Linting ist erreicht"

          echo "::group::Run ESLint"
          if [ -f package.json ] && [ "$(npm pkg get scripts.lint)" != "null" ]; then
            npm run lint
          else
            echo "Kein Lint-Script oder package.json vorhanden"
          fi
          echo "::endgroup::"

      - name: 06 - Typecheck
        run: |
          echo "Schritt Typecheck ist erreicht"

          echo "::group::Run frontend type check"
          if [ -f package.json ] && [ "$(npm pkg get scripts.typecheck)" != "null" ]; then
            npm run typecheck
          else
            echo "Kein Typecheck-Script oder package.json vorhanden"
          fi
          echo "::endgroup::"

      - name: 07 - Tests
        run: |
          echo "Schritt Tests ist erreicht"

          echo "::group::Run frontend tests"
          if [ -f package.json ] && [ "$(npm pkg get scripts.test)" != "null" ]; then
            npm test
          else
            echo "Kein Test-Script oder package.json vorhanden"
          fi
          echo "::endgroup::"

      - name: 08 - Build
        run: |
          echo "Schritt Build ist erreicht"

          echo "::group::Run frontend build"
          if [ -f package.json ] && [ "$(npm pkg get scripts.build)" != "null" ]; then
            npm run build
          else
            echo "Kein Build-Script oder package.json vorhanden"
          fi
          echo "::endgroup::"

      - name: 09 - Smoke Tests
        run: |
          echo "Schritt Smoke Tests ist erreicht"

          if [ -f package.json ] && ( [ "$(npm pkg get 'scripts.test:smoke')" != "null" ] || [ "$(npm pkg get scripts.smoke)" != "null" ] ); then
            echo "::group::Install Playwright browsers"
            if grep -q "\"@playwright/test\"" package.json; then
              npx playwright install --with-deps
            else
              echo "Playwright ist nicht in package.json definiert"
            fi
            echo "::endgroup::"

            echo "::group::Run Playwright smoke tests"
            if [ "$(npm pkg get 'scripts.test:smoke')" != "null" ]; then
              npm run test:smoke
            else
              npm run smoke
            fi
            echo "::endgroup::"
          else
            echo "Kein Smoke-Test-Script oder package.json vorhanden"
          fi

      - name: 10 - Security Scan
        run: |
          echo "Schritt Security Scan ist erreicht"

          if [ -f package.json ]; then
            echo "::group::Run npm audit (high)"
            npm audit --audit-level=high
            echo "::endgroup::"
          else
            echo "Kein package.json vorhanden"
          fi

      - name: 11 - Docker Build
        run: |

          echo "::group::Build Docker image"
          docker build -t audioexplorer-frontend-app:${{ github.sha }} .
          echo "::endgroup::"

          echo "::group::Inspect Docker image"
          docker image inspect audioexplorer-frontend-app:${{ github.sha }}
          echo "::endgroup::"

          echo "::group::Save Docker image as artifact file"
          docker save audioexplorer-frontend-app:${{ github.sha }} | gzip > audioexplorer-frontend-image.tar.gz
          ls -lh audioexplorer-frontend-image.tar.gz
          echo "::endgroup::"

      - name: 12 - Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: audioexplorer-frontend-image-${{ github.sha }}
          path: audioexplorer-frontend-image.tar.gz
          if-no-files-found: error
          retention-days: 1      
          
      - name: 13 - Staging
        run: echo "Schritt Staging ist erreicht"

      - name: 14 - Deploy Staging
        run: echo "Schritt Deploy Staging ist erreicht"

      - name: 15 - Deploy Production
        run: echo "Schritt Deploy Production ist erreicht"
