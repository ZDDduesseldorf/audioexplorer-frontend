name: Frontend CI/CD Pipeline

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main
      - "feature/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-pipeline:
    name: Frontend Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 01 - Set up Node.js (no cache)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 02 - Install dependencies
        run: npm ci

      - name: 03 - Format
        run: |
          echo "Formatting step is reached"

          echo "::group::Run Prettier format check"
            npm run format
          echo "::endgroup::"

      - name: 04 - Linting
        run: |
          echo "Linting step is reached"

          echo "::group::Run ESLint"
            npm run lint
          echo "::endgroup::"

      - name: 05 - Typecheck
        run: |
          echo "Typecheck step is reached"

          echo "::group::Run frontend type check"
            npm run typecheck
          echo "::endgroup::"

      - name: 06 - Tests
        run: |
          echo "Tests step is reached"

          echo "::group::Run frontend tests"
            npm test
          echo "::endgroup::"

      - name: 07 - Build
        run: |
          echo "Build step is reached"

          echo "::group::Run frontend build"
            npm run build
          echo "::endgroup::"

      - name: 08 - Smoke Tests
        if: github.event_name == 'pull_request'
        run: |
          echo "Smoke Tests step is reached"

            echo "::group::Install Playwright browsers"
            if grep -q "\"@playwright/test\"" package.json; then
              npx playwright install --with-deps
            echo "::endgroup::"

            echo "::group::Run Playwright smoke tests"
            if [ "$(npm pkg get 'scripts.test:smoke')" != "null" ]; then
              npm run test:smoke
            else
              npm run smoke
            fi
            echo "::endgroup::"
            fi

      - name: 09 - Security Scan
        run: |
          echo "Security Scan step is reached"

            echo "::group::Run npm audit (high)"
            npm audit --audit-level=high
            echo "::endgroup::"

      - name: 11 - Docker Build
        run: |

          echo "::group::Build Docker image"
          docker build -t audioexplorer-frontend-app:${{ github.sha }} .
          echo "::endgroup::"

          echo "::group::Inspect Docker image"
          docker image inspect audioexplorer-frontend-app:${{ github.sha }}
          echo "::endgroup::"

          echo "::group::Save Docker image as artifact file"
          docker save audioexplorer-frontend-app:${{ github.sha }} | gzip > audioexplorer-frontend-image.tar.gz
          ls -lh audioexplorer-frontend-image.tar.gz
          echo "::endgroup::"

      - name: 12 - Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: audioexplorer-frontend-image-${{ github.sha }}
          path: audioexplorer-frontend-image.tar.gz
          if-no-files-found: error
          retention-days: 1

      - name: 13 - Staging
        run: echo "Schritt Staging ist erreicht"

      - name: 14 - Deploy Staging
        run: echo "Schritt Deploy Staging ist erreicht"

      - name: 15 - Deploy Production
        run: echo "Schritt Deploy Production ist erreicht"
