name: Manual Temporary Frontend Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Required Docker image tag, for example test-1.0.0"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish-temporary-frontend-image:
    name: Publish Temporary Frontend Image
    runs-on: ubuntu-latest

    concurrency:
      group: manual-temporary-frontend-image-${{ github.ref_name }}
      cancel-in-progress: false

    env:
      PACKAGE_NAME: audioexplorer-frontend-manual

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 01 - Prepare image metadata
        run: |
          INPUT_TAG="${{ inputs.image_tag }}"

          if ! [[ "$INPUT_TAG" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "Invalid Docker tag: $INPUT_TAG"
            echo "Allowed pattern: letters, numbers, underscore, dot and dash."
            echo "The tag must not contain spaces or slashes."
            exit 1
          fi

          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"

          BRANCH_TAG="$(echo "${GITHUB_REF_NAME}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+//; s/-+$//; s/-+/-/g' \
            | cut -c1-80)"

          if [ -z "$BRANCH_TAG" ]; then
            BRANCH_TAG="unknown-branch"
          fi

          IMAGE_NAME="ghcr.io/${OWNER}/${PACKAGE_NAME}"
          MANAGEMENT_TAG="branch-${BRANCH_TAG}"

          echo "INPUT_TAG=$INPUT_TAG" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=$IMAGE_NAME" >> "$GITHUB_ENV"
          echo "MANAGEMENT_TAG=$MANAGEMENT_TAG" >> "$GITHUB_ENV"

          echo "Image name: $IMAGE_NAME"
          echo "Manual tag: $INPUT_TAG"
          echo "Branch management tag: $MANAGEMENT_TAG"

      - name: 02 - Delete existing temporary image for this branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          OWNER="${GITHUB_REPOSITORY_OWNER}"

          OWNER_TYPE="$(gh api "/users/${OWNER}" --jq '.type')"

          if [ "$OWNER_TYPE" = "Organization" ]; then
            PACKAGE_API="/orgs/${OWNER}/packages/container/${PACKAGE_NAME}/versions"
            PACKAGE_ROOT_API="/orgs/${OWNER}/packages/container/${PACKAGE_NAME}"
          else
            PACKAGE_API="/users/${OWNER}/packages/container/${PACKAGE_NAME}/versions"
            PACKAGE_ROOT_API="/users/${OWNER}/packages/container/${PACKAGE_NAME}"
          fi

          echo "Package API: $PACKAGE_API"
          echo "Package root API: $PACKAGE_ROOT_API"
          echo "Searching for existing temporary image with tag: $MANAGEMENT_TAG"

          set +e
          gh api --paginate --slurp "${PACKAGE_API}?per_page=100" > versions.json 2> api_error.log
          API_STATUS=$?
          set -e

          if [ "$API_STATUS" -ne 0 ]; then
            if grep -q "HTTP 404" api_error.log; then
              echo "Package does not exist yet. Nothing to delete."
              exit 0
            fi

            cat api_error.log
            exit 1
          fi

          VERSION_IDS="$(jq -r --arg tag "$MANAGEMENT_TAG" '
            .[][]
            | select((.metadata.container.tags // []) | index($tag))
            | .id
          ' versions.json)"

          if [ -z "$VERSION_IDS" ]; then
            echo "No existing temporary image found for this branch."
            exit 0
          fi

          for VERSION_ID in $VERSION_IDS; do
            echo "Deleting existing package version: $VERSION_ID"

            set +e
            gh api --method DELETE "${PACKAGE_API}/${VERSION_ID}" 2> delete_error.log
            DELETE_STATUS=$?
            set -e

            if [ "$DELETE_STATUS" -eq 0 ]; then
              echo "Deleted package version: $VERSION_ID"
              continue
            fi

            if grep -q "last tagged version of a package" delete_error.log; then
              echo "This is the last tagged version of the package."
              echo "Deleting the whole temporary package instead."
              gh api --method DELETE "${PACKAGE_ROOT_API}"
              exit 0
            fi

            cat delete_error.log
            exit 1
          done

      - name: 03 - Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 04 - Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 05 - Build and push temporary frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.INPUT_TAG }}
            ${{ env.IMAGE_NAME }}:${{ env.MANAGEMENT_TAG }}
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}