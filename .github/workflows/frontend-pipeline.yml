name: Frontend CI/CD Pipeline

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main
      - "feature/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  frontend-pipeline:
    name: Frontend Pipeline
    runs-on: ubuntu-latest

    env:
      ALLOW_FEATURE_GHCR_PUSH: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 01 - Set up Node.js (no cache)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 02 - Install dependencies
        run: npm ci

      - name: 03 - Format
        run: |
          echo "Formatting step is reached"

          echo "::group::Run Prettier format check"
            npm run format
          echo "::endgroup::"

      - name: 04 - Linting
        run: |
          echo "Linting step is reached"

          echo "::group::Run ESLint"
            npm run lint
          echo "::endgroup::"

      - name: 05 - Typecheck
        run: |
          echo "Typecheck step is reached"

          echo "::group::Run frontend type check"
            npm run typecheck
          echo "::endgroup::"

      - name: 06 - Tests
        run: |
          echo "Tests step is reached"

          echo "::group::Run frontend tests"
            npm test
          echo "::endgroup::"

      - name: 07 - Build
        run: |
          echo "Build step is reached"

          echo "::group::Run frontend build"
            npm run build
          echo "::endgroup::"

      - name: 08 - Smoke Tests
        if: github.event_name == 'pull_request'
        run: |
          echo "Smoke Tests step is reached"

            echo "::group::Install Playwright browsers"
            if grep -q "\"@playwright/test\"" package.json; then
              npx playwright install --with-deps
            echo "::endgroup::"

            echo "::group::Run Playwright smoke tests"
            if [ "$(npm pkg get 'scripts.test:smoke')" != "null" ]; then
              npm run test:smoke
            else
              npm run smoke
            fi
            echo "::endgroup::"
            fi

      - name: 09 - Security Scan
        run: |
          echo "Security Scan step is reached"

            echo "::group::Run npm audit (high)"
            npm audit --audit-level=high
            echo "::endgroup::"

      - name: 10.1 - Read frontend version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")

          echo "CURRENT_VERSION=$CURRENT_VERSION" >> "$GITHUB_ENV"

          echo "Current frontend version: $CURRENT_VERSION"

      - name: 10.2 - Check frontend version change
        id: version_check
        run: |
          git fetch origin main

          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            BASE_REF="${{ github.event.before }}"
          else
            BASE_REF="origin/main"
          fi

          PREVIOUS_VERSION=$(git show "$BASE_REF:package.json" | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")

          echo "Previous frontend version: $PREVIOUS_VERSION"
          echo "Current frontend version: $CURRENT_VERSION"

          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            echo "Frontend version changed."
          else
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
            echo "Frontend version did not change."
          fi

      - name: 10.3 - Set Docker image name
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"

          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            IMAGE_NAME="ghcr.io/${OWNER}/audioexplorer-frontend"
          else
            IMAGE_NAME="ghcr.io/${OWNER}/audioexplorer-frontend-test"
          fi

          echo "IMAGE_NAME=$IMAGE_NAME" >> "$GITHUB_ENV"
          echo "Image name: $IMAGE_NAME"

      - name: 10.4 - Log in to GitHub Container Registry
        if: github.event_name == 'push' && steps.version_check.outputs.version_changed == 'true' && (github.ref == 'refs/heads/main' || env.ALLOW_FEATURE_GHCR_PUSH == 'true')
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 10.5 - Build and optionally push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' && steps.version_check.outputs.version_changed == 'true' && (github.ref == 'refs/heads/main' || env.ALLOW_FEATURE_GHCR_PUSH == 'true') }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.CURRENT_VERSION }}
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

      - name: 11 - Deploy Staging
        run: echo "Schritt Deploy Staging ist erreicht"

      - name: 12 - Deploy Production
        run: echo "Schritt Deploy Production ist erreicht"
